<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Holly Pralgever, MS, CCC-SLP • INTERACTIVE SELF-MONITORING SLIDER • How did my speech sound? SELF-MONITORING SKILLS </title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Self-Monitoring Skills</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    }
    .card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13);
      padding: 32px 28px 28px;
      max-width: 680px;
      width: 100%;
      border: 3px solid #e2e8f0;
    }
    .title {
      text-align: center;
      margin-bottom: 6px;
    }
    .title h1 {
      font-family: 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: clamp(20px, 5vw, 32px);
      letter-spacing: 1px;
      color: #1a202c;
      text-transform: uppercase;
    }
    .subtitle {
      display: inline-block;
      border: 2.5px solid #90cdf4;
      border-radius: 999px;
      padding: 5px 22px;
      margin-top: 8px;
      font-size: clamp(14px, 3vw, 21px);
      color: #2d3748;
      background: #ebf8ff;
    }
    .subtitle span { color: #3182ce; font-weight: 700; }
    .instruction {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0 14px;
      font-size: clamp(12px, 2.5vw, 16px);
      color: #4a5568;
      font-style: italic;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      margin-bottom: 20px;
    }
    .rating-card {
      border-radius: 14px;
      padding: 10px 5px 12px;
      text-align: center;
      border: 2.5px solid #e2e8f0;
      cursor: pointer;
      user-select: none;
      transition: all 0.18s;
      background: #fafafa;
    }
    .rating-card.active {
      transform: scale(1.06);
    }
    .badge {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: white;
      font-weight: 900;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px;
      font-family: 'Arial Black', sans-serif;
    }
    .card-text {
      font-size: clamp(9px, 1.6vw, 12px);
      line-height: 1.35;
      margin-bottom: 9px;
      min-height: 36px;
      color: #2d3748;
    }
    .card-emoji { font-size: clamp(20px, 3.5vw, 28px); line-height: 1; }
    .track-wrap { margin: 0 12px; }
    .track {
      position: relative;
      height: 30px;
      border-radius: 999px;
      background: linear-gradient(to right, #e53e3e, #dd6b20, #d69e2e, #a0d468, #38a169);
      cursor: pointer;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
      border: 2px solid #cbd5e0;
    }
    .tick {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 14px;
      background: rgba(255,255,255,0.45);
      border-radius: 1px;
      pointer-events: none;
    }
    .thumb {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: white;
      border: 3.5px solid #e53e3e;
      box-shadow: 0 3px 14px rgba(229,62,62,0.6);
      cursor: grab;
      transition: left 0.15s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .thumb:active { cursor: grabbing; transform: translateY(-50%) scale(1.2); }
    .thumb-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #e53e3e;
      transition: background 0.2s;
    }
    .track-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      padding: 0 12px;
      font-size: clamp(10px, 2vw, 14px);
      font-weight: 700;
    }
    .banner {
      margin-top: 20px;
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.25s;
    }
    .banner-emoji { font-size: 42px; }
    .banner-label {
      color: #718096;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }
    .banner-text {
      font-size: clamp(14px, 3vw, 19px);
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="title">
    <h1>SELF-MONITORING SKILLS</h1>
    <div class="subtitle">How did my <span>speech sound</span>?</div>
    <div style="margin-top:10px; font-size:clamp(11px,2.5vw,14px); color:#718096; font-family:'Arial',sans-serif; letter-spacing:0.5px;">
      Holly Pralgever, MS, CCC – SLP
    </div>
  </div><div class="instruction">
    <span style="font-size:26px">👉</span>
    Move the slider to show how you think it sounded!
  </div><div class="cards-grid" id="cardsGrid"></div><div class="track-wrap">
    <div class="track" id="track">
      <div class="tick" style="left:0%"></div>
      <div class="tick" style="left:25%"></div>
      <div class="tick" style="left:50%"></div>
      <div class="tick" style="left:75%"></div>
      <div class="tick" style="left:100%"></div>
      <div class="thumb" id="thumb">
        <div class="thumb-dot" id="thumbDot"></div>
      </div>
    </div>
    <div class="track-labels">
      <span style="color:#e53e3e">← Not quite there...</span>
      <span style="color:#276749">Fantastic! →</span>
    </div>
  </div><div class="banner" id="banner">
    <div class="banner-emoji" id="bannerEmoji"></div>
    <div>
      <div class="banner-label" id="bannerLabel"></div>
      <div class="banner-text" id="bannerText"></div>
    </div>
  </div>
</div><script>
  const levels = [
    { value:1, emoji:"😕", color:"#e53e3e", bg:"#fff5f5", html:'I <b style="color:#e53e3e">forgot</b> my <b style="color:#e53e3e">speech</b> sound.' },
    { value:2, emoji:"🤔", color:"#dd6b20", bg:"#fffaf0", html:'I <b style="color:#dd6b20">tried</b> my <b style="color:#dd6b20">speech</b> sound.' },
    { value:3, emoji:"🙂", color:"#d69e2e", bg:"#fffff0", html:'I <b style="color:#d69e2e">almost</b> got it.' },
    { value:4, emoji:"😄👍", color:"#38a169", bg:"#f0fff4", html:'I said it <b style="color:#38a169">well!</b>' },
    { value:5, emoji:"🤩", color:"#276749", bg:"#f0fff4", html:'I said it <b style="color:#276749">perfectly!</b>' },
  ];

  let current = 1;

  // Build cards
  const grid = document.getElementById("cardsGrid");
  levels.forEach(l => {
    const div = document.createElement("div");
    div.className = "rating-card";
    div.id = "card" + l.value;
    div.innerHTML = `
      <div class="badge" style="background:${l.color}">${l.value}</div>
      <div class="card-text">${l.html}</div>
      <div class="card-emoji">${l.emoji}</div>
    `;
    div.addEventListener("click", () => setLevel(l.value));
    grid.appendChild(div);
  });

  function setLevel(val) {
    current = val;
    const l = levels[val - 1];
    const pct = ((val - 1) / 4) * 100;

    // Update thumb
    const thumb = document.getElementById("thumb");
    thumb.style.left = `calc(${pct}% - 19px)`;
    thumb.style.borderColor = l.color;
    thumb.style.boxShadow = `0 3px 14px ${l.color}99`;
    document.getElementById("thumbDot").style.background = l.color;

    // Update cards
    levels.forEach(lv => {
      const card = document.getElementById("card" + lv.value);
      if (lv.value === val) {
        card.style.background = lv.bg;
        card.style.border = `2.5px solid ${lv.color}`;
        card.style.transform = "scale(1.06)";
        card.style.boxShadow = `0 4px 16px ${lv.color}44`;
        card.classList.add("active");
      } else {
        card.style.background = "#fafafa";
        card.style.border = "2.5px solid #e2e8f0";
        card.style.transform = "scale(1)";
        card.style.boxShadow = "none";
        card.classList.remove("active");
      }
    });

    // Update banner
    const banner = document.getElementById("banner");
    banner.style.background = l.bg;
    banner.style.border = `2.5px solid ${l.color}`;
    banner.style.boxShadow = `0 4px 18px ${l.color}33`;
    document.getElementById("bannerEmoji").textContent = l.emoji;
    document.getElementById("bannerLabel").textContent = `Level ${val} selected`;
    document.getElementById("bannerText").innerHTML = l.html;
    document.getElementById("bannerText").style.color = l.color;
  }

  // Slider drag
  const track = document.getElementById("track");
  const thumb = document.getElementById("thumb");

  function getPosFromEvent(e) {
    const rect = track.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return Math.max(1, Math.min(5, Math.round(pct * 4) + 1));
  }

  thumb.addEventListener("mousedown", (e) => {
    e.preventDefault();
    const move = (ev) => setLevel(getPosFromEvent(ev));
    const up = () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  });

  thumb.addEventListener("touchstart", (e) => {
    const move = (ev) => setLevel(getPosFromEvent(ev));
    const up = () => { window.removeEventListener("touchmove", move); window.removeEventListener("touchend", up); };
    window.addEventListener("touchmove", move);
    window.addEventListener("touchend", up);
  });

  track.addEventListener("click", (e) => {
    if (e.target !== thumb) setLevel(getPosFromEvent(e));
  });

  // Init
  setLevel(1);
</script></body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
